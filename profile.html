<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaeTheFox</title>
    <link rel="icon" type="image/x-icon" href="sylveon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1030, #050510);
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: white;
        }

        .card {
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow:
                0 0 20px rgba(244, 146, 165, 0.4),
                0 0 60px rgba(201, 99, 188, 0.2);
        }
        
        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
        }

        .col {
            align-items: center;
            gap: 10px;
            padding-left: 10px;
        }

        .pfp {
            width: 120px;
            height: 120px;
            border-radius: 10%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        h1 {
            margin: 0%;
        }

        .tag {
            font-size: 14px;
            opacity: 0.6;
        }

        .bio {
            font-size: 16px;
            opacity: 0.8;
        }

        .links a {
            font-size: 2rem;
            color: white;
            margin: 0 10px;
        }

        .links a:hover {
            color: rgb(244, 146, 166);
        }
    </style>
</head>

<body>
  <div class="card">
    <div class="row">
        <img class="pfp" src="pfp.png" alt="fae pfp">
        <div class="col">
            <h1>Sylvia Fae Fenkin</h1>
            <div class="tag">22 | she/her | transfem</div>
            <div class="bio">
                unstable chaotic sylveon
            </div>
        </div>
    </div>
    <div class="links">
        <a href="https://github.com/FaeTheFox" target="_blank"><i class="fa-brands fa-github"></i></a>
        <a href="https://www.deviantart.com/sylviafae" target="_blank"><i class="fa-brands fa-deviantart"></i></a>
        <a href="https://discord.com/users/709300056960008313" target="_blank"><i class="fa-brands fa-discord"></i></a>
        <a href="https://steamcommunity.com/id/sylviafae/" target="_blank"><i class="fa-brands fa-steam"></i></a>
        <a href="https://www.xbox.com/play/user/JaiJaiPlays" target="_blank"><i class="fa-brands fa-xbox"></i></a>
    </div>
  </div>
</body>
</html>
